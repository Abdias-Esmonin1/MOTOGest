{% extends 'base.html' %}
{% block title %}Nouvelle dépense{% endblock %}
{% block page_title %}<i class="bi bi-dash-circle me-2"></i>Enregistrer une dépense{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6">
<div class="stat-card">
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
    <div class="mb-3">
      <label class="form-label fw-semibold">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors }}</div>{% endif %}
    </div>
    {% endfor %}
    <div class="d-flex gap-2 mt-4">
      <button type="submit" class="btn btn-danger">Enregistrer la dépense</button>
      <a href="{% url 'tableau_bord_finances' %}" class="btn btn-outline-secondary">Annuler</a>
    </div>
  </form>
</div>
</div></div>
{% endblock %}
