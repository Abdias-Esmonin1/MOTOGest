{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a472a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MotoGest">
<title>MotoGest — Connexion</title>
<link rel="manifest" href="{% url 'manifest' %}">
<link rel="apple-touch-icon" href="{% static 'img/pwa-icon-192.png' %}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
body { background: linear-gradient(135deg, #0f2d1c 0%, #1a472a 60%, #2d6a4f 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-card { background: #fff; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
.login-logo { text-align: center; margin-bottom: 2rem; }
.login-logo .icon { width: 70px; height: 70px; background: #1a472a; border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 2rem; color: #f0a500; margin-bottom: 1rem; }
.login-logo h4 { font-weight: 700; color: #1a472a; margin: 0; }
.login-logo p { color: #6c757d; font-size: .85rem; margin: 0; }
.form-control:focus { border-color: #1a472a; box-shadow: 0 0 0 .25rem rgba(26,71,42,.15); }
.btn-login { background: #1a472a; border: none; color: #fff; padding: .75rem; font-weight: 600; border-radius: 10px; width: 100%; transition: background .2s; }
.btn-login:hover { background: #2d6a4f; color: #fff; }
.input-group-text { background: #f8f9fa; border-color: #dee2e6; }
@media (max-width: 480px) {
  body { align-items: stretch; padding: 1rem; }
  .login-card { max-width: none; margin: auto 0; padding: 1.5rem; border-radius: 12px; }
  .login-logo { margin-bottom: 1.5rem; }
}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <div class="icon"><i class="bi bi-motorcycle"></i></div>
    <h4>MotoGest</h4>
    <p>Gestion de Flotte Moto — Administration</p>
  </div>

  {% if erreur %}
  <div class="alert alert-danger py-2 mb-3" style="border-radius:10px;">
    <i class="bi bi-exclamation-circle me-2"></i>{{ erreur }}
  </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-semibold">Identifiant</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" name="username" class="form-control" placeholder="Nom d'utilisateur" required autofocus>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Mot de passe</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" name="password" id="pwd" class="form-control" placeholder="••••••••" required>
        <button class="btn btn-outline-secondary" type="button" onclick="togglePwd()">
          <i class="bi bi-eye" id="eye-icon"></i>
        </button>
      </div>
    </div>
    <button type="submit" class="btn-login"><i class="bi bi-box-arrow-in-right me-2"></i>Se connecter</button>
  </form>

  <p class="text-center text-muted mt-4 mb-0" style="font-size:.78rem;">
    <i class="bi bi-shield-lock me-1"></i>Accès réservé à l'administrateur
  </p>
</div>
<script>
function togglePwd() {
  const p = document.getElementById('pwd');
  const e = document.getElementById('eye-icon');
  if (p.type === 'password') { p.type = 'text'; e.className = 'bi bi-eye-slash'; }
  else { p.type = 'password'; e.className = 'bi bi-eye'; }
}
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register("{% url 'service_worker' %}").catch(() => {});
  });
}
</script>
</body>
</html>
