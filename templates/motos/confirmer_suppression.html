{% extends 'base.html' %}
{% block title %}Supprimer{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-5">
<div class="stat-card text-center">
  <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:3rem;"></i>
  <h5 class="mt-3">Supprimer {{ moto.nom }} ?</h5>
  <p class="text-muted">Cette action est irréversible. Tous les paiements associés seront également supprimés.</p>
  <form method="post">{% csrf_token %}
    <button type="submit" class="btn btn-danger me-2">Oui, supprimer</button>
    <a href="{% url 'liste_motos' %}" class="btn btn-outline-secondary">Annuler</a>
  </form>
</div>
</div>
</div>
{% endblock %}
